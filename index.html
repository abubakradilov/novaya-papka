

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noble Finances</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-7xl bg-[#A1E8B9] rounded-[32px] min-h-[85vh] flex flex-col justify-between p-8 md:p-12 relative overflow-hidden shadow-2xl">
        
        <header class="flex justify-between items-center z-10">
            <div class="text-[#24401e] font-bold text-2xl tracking-tight">
                Noble Finances
            </div>
            <nav class="flex items-center gap-8">
                <a href="#" class="text-[#24401e] font-medium hover:opacity-80 transition">Services</a>
                <a href="#" class="bg-[#24401e] text-[#A1E8B9] px-6 py-3 rounded-full font-medium hover:bg-opacity-90 transition">
                    Book an appointment
                </a>
            </nav>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center my-auto z-10">
            
            <div class="max-w-xl space-y-6">
                <h1 class="text-5xl md:text-7xl font-semibold text-[#24401e] leading-[1.1] tracking-tight">
                    Financial Clarity You Can Trust
                </h1>
                <p class="text-[#24401e] opacity-90 text-lg md:text-xl font-normal">
                    Trusted financial guidance for every stage of life and business since 1987
                </p>
                <div class="pt-4">
                    <a href="#" class="bg-[#24401e] text-white px-6 py-4 rounded-full font-medium inline-block hover:bg-opacity-90 transition">
                        Connect with our experts
                    </a>
                </div>
            </div>

            <div class="flex justify-center lg:justify-end items-center relative">
                <img src="https://st.muslim.uz/cache/6/f/1/c/9/6f1c9d342ea983190f9a25bdcbb6eb7b20bbf7a8.jpeg" 
                     alt="Global Network" 
                     class="w-full max-w-[450px] aspect-square object-cover rounded-full mix-blend-multiply opacity-85">
            </div>

        </main>

    </div>

</html>
